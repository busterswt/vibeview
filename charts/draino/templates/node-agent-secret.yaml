{{- if .Values.nodeAgent.enabled -}}
{{- $secretName := include "draino.nodeAgentSecretName" . -}}
{{- $serviceName := include "draino.nodeAgentName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- if $existing -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "draino.labels" . | nindent 4 }}
type: Opaque
data:
  ca.crt: {{ index $existing.data "ca.crt" }}
  tls.crt: {{ index $existing.data "tls.crt" }}
  tls.key: {{ index $existing.data "tls.key" }}
  token: {{ index $existing.data "token" }}
{{- else -}}
{{- $ca := genCA (printf "%s-node-agent-ca" (include "draino.fullname" .)) 3650 -}}
{{- $dnsNames := list
    $serviceName
    (printf "%s.%s" $serviceName .Release.Namespace)
    (printf "%s.%s.svc" $serviceName .Release.Namespace)
    (printf "%s.%s.svc.cluster.local" $serviceName .Release.Namespace)
    (printf "*.%s.%s.svc" $serviceName .Release.Namespace)
    (printf "*.%s.%s.svc.cluster.local" $serviceName .Release.Namespace)
-}}
{{- $cert := genSignedCert $serviceName nil $dnsNames 3650 $ca -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "draino.labels" . | nindent 4 }}
type: Opaque
data:
  ca.crt: {{ $ca.Cert | b64enc }}
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
  token: {{ randAlphaNum 48 | b64enc }}
{{- end -}}
{{- end -}}
