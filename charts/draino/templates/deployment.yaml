apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "draino.fullname" . }}
  labels:
    {{- include "draino.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "draino.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "draino.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "draino.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: draino
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - draino
          args:
            - --web
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --audit-log
            - {{ .Values.auditLog.path | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.tmpVolume.enabled .Values.ssh.enabled }}
          volumeMounts:
            {{- if .Values.tmpVolume.enabled }}
            - name: tmp
              mountPath: /tmp
            {{- end }}
            {{- if .Values.ssh.enabled }}
            - name: ssh
              mountPath: {{ .Values.ssh.mountPath }}
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.tmpVolume.enabled .Values.ssh.enabled }}
      volumes:
        {{- if .Values.tmpVolume.enabled }}
        - name: tmp
          emptyDir: {}
        {{- end }}
        {{- if .Values.ssh.enabled }}
        - name: ssh
          secret:
            secretName: {{ .Values.ssh.secretName | quote }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
