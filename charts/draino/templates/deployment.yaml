apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "draino.fullname" . }}
  labels:
    {{- include "draino.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "draino.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "draino.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "draino.serviceAccountName" . }}
      automountServiceAccountToken: true
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: draino
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - draino
          args:
            - --web
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --audit-log
            - {{ .Values.auditLog.path | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: DRAINO_NODE_AGENT_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: DRAINO_NODE_AGENT_SERVICE_NAME
              value: {{ include "draino.nodeAgentName" . | quote }}
            - name: DRAINO_NODE_AGENT_LABEL_SELECTOR
              value: {{ default (printf "app.kubernetes.io/name=%s,app.kubernetes.io/instance=%s,app.kubernetes.io/component=node-agent" (include "draino.name" .) .Release.Name) .Values.nodeAgent.labelSelector | quote }}
            - name: DRAINO_NODE_AGENT_PORT
              value: {{ .Values.nodeAgent.port | quote }}
            - name: DRAINO_NODE_AGENT_CA_FILE
              value: /var/run/draino-node-agent/ca.crt
            - name: DRAINO_NODE_AGENT_TOKEN_FILE
              value: /var/run/draino-node-agent/token
            - name: DRAINO_IMAGE_REPOSITORY
              value: {{ .Values.image.repository | quote }}
            - name: DRAINO_IMAGE_TAG
              value: {{ .Values.image.tag | quote }}
            - name: DRAINO_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DRAINO_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.tmpVolume.enabled }}
            - name: tmp
              mountPath: /tmp
            {{- end }}
            - name: node-agent-auth
              mountPath: /var/run/draino-node-agent
              readOnly: true
      volumes:
        {{- if .Values.tmpVolume.enabled }}
        - name: tmp
          emptyDir: {}
        {{- end }}
        - name: node-agent-auth
          secret:
            secretName: {{ include "draino.nodeAgentSecretName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
