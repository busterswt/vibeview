{{- if or .Values.serviceAccount.create .Values.nodeAgent.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "draino.serviceAccountName" . }}
  labels:
    {{- include "draino.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ or .Values.serviceAccount.automountServiceAccountToken .Values.nodeAgent.enabled }}
{{- end }}
