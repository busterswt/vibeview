{{- if and .Values.gateway.enabled .Values.gateway.create -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ default .Release.Namespace .Values.gateway.namespace }}
  labels:
    {{- include "draino.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: {{ index .Values.gateway.hostnames 0 | quote }}
      allowedRoutes:
        namespaces:
          from: All
    {{- if .Values.gateway.tls.enabled }}
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ index .Values.gateway.hostnames 0 | quote }}
      tls:
        mode: {{ .Values.gateway.tls.mode }}
        certificateRefs:
          {{- toYaml .Values.gateway.tls.certificateRefs | nindent 10 }}
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
{{- end }}
