replicaCount: 1

image:
  repository: ghcr.io/busterswt/draino-claude
  tag: main
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$cookie_draino_session"
  hosts:
    - host: draino.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: draino-tls
      hosts:
        - draino.example.com

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []

auditLog:
  path: /tmp/draino-audit.log

ssh:
  enabled: false
  secretName: ""
  mountPath: /home/draino/.ssh

tmpVolume:
  enabled: true

serviceAccount:
  create: false
  automountServiceAccountToken: false
  annotations: {}
  name: ""
