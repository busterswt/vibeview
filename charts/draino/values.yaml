replicaCount: 1

image:
  repository: ghcr.io/busterswt/draino-claude
  tag: main
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

nodeAgent:
  port: 8443
  labelSelector: ""
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
  podAnnotations: {}
  hostPID: true
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: openstack-compute-node
                operator: In
                values:
                  - enabled
          - matchExpressions:
              - key: openstack-network-node
                operator: In
                values:
                  - enabled
          - matchExpressions:
              - key: openstack-control-plane
                operator: In
                values:
                  - enabled
          - matchExpressions:
              - key: openstack-storage-node
                operator: In
                values:
                  - enabled
  securityContext:
    privileged: true
    allowPrivilegeEscalation: true
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0

gateway:
  enabled: true
  gatewayClassName: envoy-gateway-class
  create: false
  name: shared-gateway
  namespace: ""
  parentRefs:
    - name: shared-gateway
      namespace: ""
      sectionName: https
  annotations: {}
  hostnames:
    - draino.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
  tls:
    enabled: false
    mode: Terminate
    certificateRefs: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []

auditLog:
  path: /tmp/draino-audit.log

tmpVolume:
  enabled: true

serviceAccount:
  create: false
  automountServiceAccountToken: false
  annotations: {}
  name: ""
