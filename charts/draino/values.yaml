replicaCount: 1

image:
  repository: ghcr.io/busterswt/draino-claude
  tag: main
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

gateway:
  enabled: true
  gatewayClassName: envoy-gateway-class
  create: false
  name: shared-gateway
  namespace: ""
  parentRefs:
    - name: shared-gateway
      namespace: ""
      sectionName: https
  annotations: {}
  hostnames:
    - draino.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
  tls:
    enabled: false
    mode: Terminate
    certificateRefs: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []

auditLog:
  path: /tmp/draino-audit.log

ssh:
  enabled: false
  secretName: ""
  mountPath: /home/draino/.ssh

tmpVolume:
  enabled: true

serviceAccount:
  create: false
  automountServiceAccountToken: false
  annotations: {}
  name: ""
