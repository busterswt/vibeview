apiVersion: v1
kind: Namespace
metadata:
  name: draino
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: draino
  namespace: draino
  labels:
    app.kubernetes.io/name: draino
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: draino
  template:
    metadata:
      labels:
        app.kubernetes.io/name: draino
    spec:
      automountServiceAccountToken: false
      containers:
        - name: draino
          image: registry.example.com/operations/draino:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - draino
          args:
            - --web
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --audit-log
            - /tmp/draino-audit.log
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # Mount SSH material if you want reboot support from inside the pod.
            # - name: ssh
            #   mountPath: /home/draino/.ssh
            #   readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        # - name: ssh
        #   secret:
        #     secretName: draino-ssh
---
apiVersion: v1
kind: Service
metadata:
  name: draino
  namespace: draino
  labels:
    app.kubernetes.io/name: draino
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: draino
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: draino
  namespace: draino
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$cookie_draino_session"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - draino.example.com
      secretName: draino-tls
  rules:
    - host: draino.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: draino
                port:
                  name: http
