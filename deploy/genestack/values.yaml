replicaCount: 1

image:
  repository: ghcr.io/busterswt/vibeview
  tag: main

gateway:
  enabled: true
  create: false
  gatewayClassName: envoy-gateway-class
  name: shared-gateway
  parentRefs:
    - name: shared-gateway
      namespace: ""
      sectionName: https
  hostnames:
    - draino.example.com

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
