replicaCount: 1

image:
  repository: ghcr.io/busterswt/draino-claude
  tag: main

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: draino.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: draino-tls
      hosts:
        - draino.example.com

ssh:
  enabled: false
  secretName: draino-ssh

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
